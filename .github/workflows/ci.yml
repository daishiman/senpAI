name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
      - ".gitignore"
      - ".claude/**"
      - ".agents/**"
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
      - ".gitignore"
      - ".claude/**"
      - ".agents/**"
  merge_group:
  workflow_dispatch:
    inputs:
      reason:
        description: "手動実行の理由（任意）"
        required: false
        default: "manual trigger"

# 最小権限の原則
permissions:
  contents: read
  pull-requests: read

# 同時実行制御: 同じブランチの古いワークフローをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: hashFiles('package.json') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install-retry

      - name: Run lint
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: [build-shared]
    timeout-minutes: 10
    if: hashFiles('package.json') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install-retry

      - name: Download shared build artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-build
          path: packages/shared/dist/

      - name: Run typecheck
        run: pnpm typecheck

  # 共通ビルドステップ: shared packageをビルドしてartifactとして共有
  build-shared:
    name: Build Shared
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('package.json') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install-retry

      - name: Build shared package
        run: pnpm --filter @repo/shared build

      - name: Upload shared build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-build
          path: packages/shared/dist/
          retention-days: 1

  test-shared:
    name: Test (shared)
    runs-on: ubuntu-latest
    needs: [build-shared]
    timeout-minutes: 10
    if: hashFiles('package.json') != ''
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install-retry

      - name: Download shared build artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-build
          path: packages/shared/dist/

      - name: Run shared package tests
        run: pnpm --filter @repo/shared test:run

  check-module-sync:
    name: Module Sync Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('package.json') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install-retry

      - name: Check module sync
        run: pnpm check:module-sync

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: hashFiles('package.json') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install-retry

      - name: Run security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # カバレッジをCodecovにアップロード
  # main pushトリガーのみ実行（PR時はカバレッジスキップで高速化）
  # テストは各ジョブで実行済み、ここではアーティファクトをマージしてアップロードのみ
  coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test-shared]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('package.json') != ''
    steps:
      - name: Download web coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: web-coverage-*
          path: coverage/web
          merge-multiple: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage/
          flags: web
          fail_ci_if_error: false
          verbose: true

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: hashFiles('package.json') != ''
    needs:
      [
        lint,
        typecheck,
        test-shared,
        build-shared,
        check-module-sync,
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        uses: ./.github/actions/pnpm-install-retry

      - name: Download shared build artifact
        uses: actions/download-artifact@v4
        with:
          name: shared-build
          path: packages/shared/dist/

      - name: Verify build artifacts
        run: |
          test -d packages/shared/dist || exit 1
          echo "✅ Shared package built successfully"
