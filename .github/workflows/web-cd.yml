name: Web CD

on:
  push:
    branches: [main, dev]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "packages/integrations/**"
      - ".github/workflows/web-cd.yml"
  workflow_dispatch:

# 最小権限の原則
permissions:
  contents: read
  deployments: write

concurrency:
  group: web-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # apps/web ディレクトリの存在をチェック
  check:
    name: Check Web App Exists
    runs-on: ubuntu-latest
    outputs:
      web_exists: ${{ steps.check_dir.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if apps/web exists
        id: check_dir
        run: |
          if [ -d "apps/web" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ apps/web ディレクトリが存在します"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ apps/web ディレクトリが存在しません。ワークフローをスキップします。"
          fi

  ci:
    name: Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    if: needs.check.outputs.web_exists == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @repo/shared build

      - name: Build web app
        run: pnpm --filter @repo/web build
        env:
          NODE_ENV: production

      - name: Type check
        run: pnpm --filter @repo/web typecheck

      - name: Lint
        run: pnpm --filter @repo/web lint

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [check, ci]
    if: needs.check.outputs.web_exists == 'true'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @repo/shared build

      - name: Build web app
        run: pnpm --filter @repo/web build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.next --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.ref == 'refs/heads/main' && 'main' || 'dev' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Success
        if: success()
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          service: web
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Failure
        if: failure()
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          service: web
          error_message: "Cloudflare Pages deployment failed"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
