name: Backend CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

# 最小権限の原則
permissions:
  contents: read
  pull-requests: read
  deployments: write

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'packages/integrations/**'
              - '.github/workflows/backend-ci.yml'

  ci:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @repo/shared build

      - name: Build API (Workers)
        run: pnpm --filter @repo/api build

      - name: Run API tests
        run: pnpm --filter @repo/api test:run

      - name: Type check
        run: pnpm --filter @repo/api typecheck

      - name: Lint
        run: pnpm --filter @repo/api lint

  ci-skip:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend != 'true'
    steps:
      - run: echo "No API changes detected. Skipping."

  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @repo/shared build

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config apps/api/wrangler.toml --env ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Health check
        env:
          API_DOMAIN: ${{ github.ref == 'refs/heads/main' && vars.CLOUDFLARE_WORKERS_DOMAIN || vars.CLOUDFLARE_WORKERS_STAGING_DOMAIN }}
        run: |
          if [ -z "$API_DOMAIN" ]; then
            echo "⚠️  CLOUDFLARE_WORKERS_DOMAIN が設定されていません。ヘルスチェックをスキップします。"
            exit 0
          fi

          MAX_RETRIES=10
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "ヘルスチェック試行 $((RETRY_COUNT + 1))/$MAX_RETRIES..."

            if curl -f -s "https://${API_DOMAIN}/api/health" > /dev/null; then
              echo "✅ デプロイ成功！"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 10
          done

          echo "❌ ヘルスチェック失敗"
          exit 1

      - name: Notify Success
        if: success()
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          service: api
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Failure
        if: failure()
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          service: api
          error_message: "Cloudflare Workers deployment failed"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
