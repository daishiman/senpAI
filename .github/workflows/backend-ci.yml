name: Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 最小権限の原則
permissions:
  contents: read
  pull-requests: read
  deployments: write

concurrency:
  group: backend-cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/shared/**'
              - '.github/workflows/backend-ci.yml'

  ci:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @repo/shared build

      - name: Build backend
        run: pnpm --filter @repo/backend build

      - name: Run backend tests
        run: pnpm --filter @repo/backend test:run

      - name: Type check
        run: pnpm --filter @repo/backend typecheck

      - name: Lint
        run: pnpm --filter @repo/backend lint

  ci-skip:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend != 'true'
    steps:
      - run: echo "No backend changes detected. Skipping."

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    if: false # Railway 運用停止中のため deploy を無効化
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying to Railway..."
          set +e
          DEPLOY_OUTPUT="$(railway up --service backend --detach 2>&1)"
          DEPLOY_EXIT_CODE=$?
          set -e

          echo "$DEPLOY_OUTPUT"

          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            if echo "$DEPLOY_OUTPUT" | grep -qi "Usage limit exceeded"; then
              echo "::error title=Railway usage limit exceeded::Railway の Hard limit を超過しています。Railway Dashboard > Usage で Hard limit を引き上げるか解除してください。"
            fi
            exit $DEPLOY_EXIT_CODE
          fi

          echo "✅ Deployment triggered successfully"

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        env:
          RAILWAY_DOMAIN: ${{ secrets.RAILWAY_DOMAIN }}
        run: |
          if [ -z "$RAILWAY_DOMAIN" ]; then
            echo "⚠️  RAILWAY_DOMAIN が設定されていません。ヘルスチェックをスキップします。"
            exit 0
          fi

          MAX_RETRIES=10
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "ヘルスチェック試行 $((RETRY_COUNT + 1))/$MAX_RETRIES..."

            if curl -f -s "https://${RAILWAY_DOMAIN}/api/health" > /dev/null; then
              echo "✅ デプロイ成功！"
              curl -s "https://${RAILWAY_DOMAIN}/api/health" | jq .
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            sleep 10
          done

          echo "❌ ヘルスチェック失敗"
          exit 1

      - name: Notify Success
        if: success()
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          service: backend
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Failure
        if: failure()
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          service: backend
          error_message: "Deployment or health check failed"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
